services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: calculatorGCC_nginx_prod
    depends_on:
      - backend
      - phpmyadmin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-calculatorgcc}.rule=Host(`${APP_DOMAIN:-rncp.theomouty.fr}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-calculatorgcc}.entrypoints=https"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-calculatorgcc}.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-calculatorgcc}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${TRAEFIK_SERVICE_NAME:-calculatorgcc}.loadbalancer.server.port=3000"
      - "traefik.docker.network=coolify"
    environment:
      NODE_PROJET: production
      ENABLE_SSL: ${ENABLE_SSL:-false}
    volumes:
      - ssl_certs:/etc/nginx/ssl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - calculatorGCC_network
      - coolify

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: calculatorGCC_backend_prod
    depends_on:
      mariadb:
        condition: service_healthy
      db-clone:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 7000
      HOSTNAME: ${HOSTNAME:-localhost}
      ENABLE_SSL: ${ENABLE_SSL:-false}
      DATABASE_URL: mysql://${DB_USER:-calculatorgcc_user}:${DB_PASSWORD}@mariadb:3306/${DB_NAME:-calculatorgcc}
    env_file:
      - ./backend/srcs/.env
    restart: unless-stopped
    networks:
      - calculatorGCC_network

  db-clone:
    image: mariadb:latest
    container_name: calculatorGCC_db_clone_prod
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      CLONE_FROM_PROD_ENABLED: ${CLONE_FROM_PROD_ENABLED:-false}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME:-calculatorgcc}
      TARGET_DB_HOST: mariadb
      TARGET_DB_PORT: 3306
      PROD_DB_HOST: ${PROD_DB_HOST:-}
      PROD_DB_PORT: ${PROD_DB_PORT:-3306}
      PROD_DB_NAME: ${PROD_DB_NAME:-${DB_NAME:-calculatorgcc}}
      PROD_DB_USER: ${PROD_DB_USER:-}
      PROD_DB_PASSWORD: ${PROD_DB_PASSWORD:-}
      PROD_DB_WAIT_TIMEOUT: ${PROD_DB_WAIT_TIMEOUT:-120}
      TARGET_DB_WAIT_TIMEOUT: ${TARGET_DB_WAIT_TIMEOUT:-120}
    volumes:
      - ./scripts/clone-prod-db.sh:/usr/local/bin/clone-prod-db.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/clone-prod-db.sh"]
    restart: "no"
    networks:
      - calculatorGCC_network
      - coolify

  mariadb:
    image: mariadb:latest
    container_name: calculatorGCC_mariadb_prod
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-calculatorgcc}
      MYSQL_USER: ${DB_USER:-calculatorgcc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${MARIADB_DATA_PATH:?}:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      calculatorGCC_network: {}
      coolify:
        aliases:
          - ${DB_SHARED_ALIAS:-calculatorgcc-db}

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: calculatorGCC_phpmyadmin_prod
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      UPLOAD_LIMIT: 50M
      PMA_ABSOLUTE_URI: https://${HOSTNAME:-localhost}/phpmyadmin/
    restart: unless-stopped
    networks:
      - calculatorGCC_network

networks:
  calculatorGCC_network:
    driver: bridge
  coolify:
    external: true

volumes:
  ssl_certs:
