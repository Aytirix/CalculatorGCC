services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: calculatorGCC_nginx_prod
    depends_on:
      - backend
      - phpmyadmin
    labels:
      - "traefik.http.services.nginx.loadbalancer.server.port=3000"
    environment:
      NODE_PROJET: production
      ENABLE_SSL: false
    ports:
      - "3000:3000"
    # plus besoin de volumes frontend_build
    volumes:
      - ssl_certs:/etc/nginx/ssl
    restart: unless-stopped
    networks:
      - calculatorGCC_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: calculatorGCC_backend_prod
    environment:
      NODE_ENV: production
      PORT: 7000
      HOSTNAME: ${HOSTNAME:-localhost}
      ENABLE_SSL: false
    env_file:
      - ./backend/srcs/.env
    restart: unless-stopped
    networks:
      - calculatorGCC_network

  mariadb:
    image: mariadb:latest
    container_name: calculatorGCC_mariadb_prod
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-calculatorgcc}
      MYSQL_USER: ${DB_USER:-calculatorgcc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - calculatorGCC_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: calculatorGCC_phpmyadmin_prod
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      UPLOAD_LIMIT: 50M
      PMA_ABSOLUTE_URI: ${HOSTNAME:-localhost}:3000/phpmyadmin/
    restart: unless-stopped
    networks:
      - calculatorGCC_network

networks:
  calculatorGCC_network:
    driver: bridge

volumes:
  ssl_certs:
  mariadb_data:
